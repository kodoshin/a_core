<title>Kira chat</title>

{% extends 'layouts/blank.html' %}


{% block content %}


    <wrapper class="block max-w-5xl mx-auto my-10 px-1">
    <div id="chat_window" class="h-[45rem] flex flex-col bg-gray-800 rounded-2xl shadow-2xl relative p-1">
        <!--
        <div class="flex justify-center text-emerald-400 bg-gray-800 p-2 sticky top-0 z-10">
            <span id="online-count" class="pr-1"></span>online
        </div>
        -->
        <div id='chat_container' class="overflow-y-auto grow">
            <ul id='chat_messages' class="flex flex-col justify-end gap-2 p-4">
                {% for message in chat_messages reversed %}
                    {% include 'a_rtchat/chat_message.html' %}
                {% endfor %}


            </ul>



            <div id="loading-spinner" class="flex justify-center my-2" style="display: none;">
                <svg class="animate-spin h-5 w-5 text-emerald-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                </svg>
            </div>

            <br>



        </div>
        <div class="sticky bottom-0 z-10 p-2 bg-gray-800">
            <div class="flex items-center rounded-xl px-2 py-2">
               <form id="chat_message_form" class="w-full"
                        hx-ext="ws"
                        ws-connect="/ws/chatroom/public-chat"
                        ws-send="message: {{ form.body.value }}"
                        _="on htmx:wsAfterSend reset() me">
                    {% csrf_token %}
                    {{ form }}
                </form>
            </div>
        </div>
    </div>
</wrapper>


{% endblock %}


{% block javascript %}
<script>
    function scrollToBottom() {
        const container = document.getElementById('chat_container');
        container.scrollTop = container.scrollHeight;
    }

    document.addEventListener('htmx:wsBeforeSend', function() {
        document.getElementById('loading-spinner').style.display = 'flex';
    });

    document.addEventListener('htmx:wsAfterMessage', function() {
        document.getElementById('loading-spinner').style.display = 'none';
        scrollToBottom();
    });

    scrollToBottom();
</script>
{% endblock %}
