[phases.setup]
nixPkgs = ["python3", "gcc", "postgresql_16.dev"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput", "python manage.py migrate"]

[start]
cmd = "gunicorn a_core.wsgi:application --bind 0.0.0.0:$PORT"
