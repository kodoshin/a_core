[phases.setup]
nixPkgs = ["python3", "gcc", "postgresql_16.dev", "cronie"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[start]
cmd = """crond -f &

      # Supprime l’ancienne crontab (ignore l’erreur si elle n’existe pas)
      python manage.py crontab remove || true &&

      # Ajoute votre job défini dans settings.CRÓNJOBS
      python manage.py crontab add &&
      
      gunicorn a_core.wsgi:application \
       --bind 0.0.0.0:$PORT \
       --timeout 300 \
       --workers 2 \
       --threads 4"""
