<head>
    <title>Authenticating…</title>
</head>
<body style="background:#1f1e23;color:white">
<script>
(function () {
    const HOME_URL = '/';
    const MESSAGE  = 'social-auth-success';
    const ORIGIN   = window.location.origin;

    /* 1. First try the classical opener channel */
    if (window.opener && !window.opener.closed) {
        try {
            window.opener.postMessage(MESSAGE, ORIGIN);
        } catch (e) {
            /* Cross-origin → direct reload */
            try { window.opener.location.assign(HOME_URL); } catch (_) {}
        }
    } else if ('BroadcastChannel' in window) {
        /* 2. Fallback : BroadcastChannel */
        try {
            const bc = new BroadcastChannel('auth_channel');
            bc.postMessage(MESSAGE);
            bc.close();
        } catch (_) {}
    }

    /* 3. Close the popup, or at least redirect it */
    try {
        window.close();
        setTimeout(function () { window.location.assign(HOME_URL); }, 100);
    } catch (_) {
        window.location.assign(HOME_URL);
    }
})();
</script>
</body>
