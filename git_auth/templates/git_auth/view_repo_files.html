<title>Repository files</title>

{% extends 'layouts/blank.html' %}
{% load static %}


<link rel="stylesheet" type="text/css" href="{% static 'git_auth/css/styles.css' %}">

{% block content %}


<form method="POST" action="{% url 'process_selected_files' git_repo_id=file_tree.git_repo_id repo_name=file_tree.repo_name %}">
    {% csrf_token %}
    <input title="element_selector" type="hidden" name="project_id" value="{{ project.id }}">
    <input type="hidden" name="git_branch" value="{{ selected_branch }}">
    <div class="container" style="background-color: unset">
        <h1 class="repo-name" style="color: white; margin-bottom: 25px;">{{ file_tree.repo_name }}</h1>
        <ul class="file-tree">
            {% for item in file_tree.file_tree %}
                {% include 'git_auth/file_item.html' with item=item %}
            {% endfor %}
        </ul>
    </div>
    <div style="margin-left: 20%;">
        <button type="submit">Submit</button>
    </div>
</form>

<div id="progress-container" style="display:none; margin-top:20px; margin-left: 20%;">
    <p>Progress: <span id="progress-count">0/0</span></p>
</div>



<script>
document.addEventListener("DOMContentLoaded", function() {
    // Sélection de tous les dossiers
    const folders = document.querySelectorAll('.folder');

    folders.forEach(folder => {
        folder.addEventListener('click', function() {
            console.log("Clique sur le dossier :", folder.innerText);
            const parentLi = folder.closest('li.file-item');
            if (!parentLi) return;

            const subUl = parentLi.querySelector('ul.file-tree');
            if (subUl) {
                subUl.classList.toggle('hidden');
            }
        });
    });

    // Propagate check/uncheck state from a folder to all its child checkboxes
    const fileCheckboxes = document.querySelectorAll('.file-checkbox');
    fileCheckboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const li = this.closest('li.file-item');
            if (!li) return;
            // If the list item contains a child tree, it represents a folder
            const childTree = li.querySelector('ul.file-tree');
            if (childTree) {
                const childCheckboxes = childTree.querySelectorAll('.file-checkbox');
                childCheckboxes.forEach(childCheckbox => {
                    childCheckbox.checked = this.checked;
                });
            }
            // Si décoché, décocher les parents
            if (!this.checked) {
                let parentLi = li.parentElement.closest('li.file-item');
                while (parentLi) {
                    const parentCb = parentLi.querySelector('.item-row > .file-checkbox');
                    if (parentCb) parentCb.checked = false;
                    parentLi = parentLi.parentElement.closest('li.file-item');
                }
            }

            // Remontée récursive : décocher ou cocher le parent selon l'état de tous ses enfants
            let parentLi = li.parentElement.closest('li.file-item');
            while (parentLi) {
                const parentCb = parentLi.querySelector('.item-row > .file-checkbox');
                const subtree = parentLi.querySelector('ul.file-tree');
                if (parentCb && subtree) {
                    const childCbs = subtree.querySelectorAll('.file-checkbox');
                    const allChecked = Array.from(childCbs).every(cb => cb.checked);
                    parentCb.checked = allChecked;
                }
                parentLi = parentLi.parentElement.closest('li.file-item');
            }

        });
    });

    const form = document.querySelector('form');
    const progressContainer = document.getElementById('progress-container');
    const progressCount = document.getElementById('progress-count');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        progressContainer.style.display = 'block';
        const formData = new FormData(form);
        const url = form.getAttribute('action');

        fetch(url, {
            method: 'POST',
            body: formData
        }).then(response => {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            function read() {
                reader.read().then(({ done, value }) => {
                    if (done) {
                        window.location = "{% url 'home' %}";
                        return;
                    }
                    buffer += decoder.decode(value, { stream: true });
                    let lines = buffer.split('\n');
                    buffer = lines.pop();
                    lines.forEach(line => {
                        if (line.trim()) {
                            const obj = JSON.parse(line);
                            progressCount.innerText = obj.count + '/' + obj.total;
                        }
                    });
                    read();
                });
            }
            read();
        });
    });
});
</script>

{% endblock %}
