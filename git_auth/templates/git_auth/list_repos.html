<title>Repositories</title>

{% extends 'layouts/blank.html' %}

{% block content %}
<div class="content-wrapper">
    <br> <br> <br> <br>
    <form method="get" id="repo-form">
        <label for="repo">Select a Repository:</label>
        <select name="repo" id="repo" style="color: black">
            <option value="" disabled selected>Select a repository</option>
            {% for repo in repos %}
                <option style="color: black;"
                        value="{{ repo.name }}"
                        data-id="{{ repo.id }}"
                        data-name="{{ repo.name }}"
                        data-created="{{ repo.created_at }}"
                        data-title="{{ repo.description }}"
                        data-url="{{ repo.html_url }}">
                    {{ repo.name }}
                </option>
            {% endfor %}
        </select>
        {% if repos_status == 0 %}
        <p style="color: indianred">Your github token is invalid, please follow this <a href="{% url 'token_tutorial' %}" target="_blank" rel="noopener noreferrer">tutorial</a></p>
        {% endif %}



        <div id="branch-container" style="display:none; margin-top:10px;">
            <label for="branch">Select a Branch:</label>
            <select name="branch" id="branch" style="color: black;">
                <option value="" disabled selected>Select a branch</option>
            </select>
        </div>


        <div id="repo-details" style="margin-top: 20px; display: none;">
            <h2>Repository Details:</h2>
            <p><strong>Name:</strong> <span id="repo-name"></span></p>
            <p><strong>Description:</strong> <span id="repo-title"></span></p>
            <p><strong>Created at:</strong> <span id="repo-created"></span></p>
            <p><strong>URL:</strong> <a id="repo-url" href="#" target="_blank">View Repository</a></p>
        </div>

        <br> <br>
        <button type="button" class="select-button" onclick="redirectToRepo()">Continue</button>
    </form>
</div>



    <style>
      .content-wrapper {
        margin-left: 50px; /* Applique une marge de 50px à gauche */
      }
      .select-button {
        height: 30px;
        display: flex;
        align-items: center; /* Centre verticalement */
        justify-content: center; /* Centre horizontalement */
        padding: 0 10px;
        border: none;
      }
    </style>



<!--  … everything that was already in the template stays unchanged up to the JS … -->
<script>
document.addEventListener('DOMContentLoaded', () => {
    const repoSelector   = document.getElementById('repo');
    const branchWrapper  = document.getElementById('branch-container');
    const branchSelector = document.getElementById('branch');

    repoSelector.addEventListener('change', async function () {
        const selectedRepo = repoSelector.options[repoSelector.selectedIndex];

        if (!selectedRepo.value) {
            /* hide branch selector & repo details if no repo is selected */
            branchWrapper.style.display = 'none';
            document.getElementById('repo-details').style.display = 'none';
            return;
        }

        /* -----------------------------
           Fill repo information section
        ------------------------------*/
        document.getElementById('repo-name').textContent    = selectedRepo.dataset.name;
        document.getElementById('repo-title').textContent   = selectedRepo.dataset.title || 'No description available';
        document.getElementById('repo-url').href            = selectedRepo.dataset.url;
        document.getElementById('repo-created').textContent = selectedRepo.dataset.created;
        document.getElementById('repo-details').style.display = 'block';

        /* -----------------------------
           Retrieve & populate branches
        ------------------------------*/
        branchSelector.innerHTML =
            '<option value="" disabled selected>Select a branch</option>';  // reset

        try {
            const response = await fetch(`/git/ajax/branches/${selectedRepo.dataset.name}/`);
            const data = await response.json();

            if (data.branches && data.branches.length) {
                data.branches.forEach(branch => {
                    const opt = document.createElement('option');
                    opt.value = branch.name;
                    opt.text  = branch.name;
                    branchSelector.appendChild(opt);
                });
                branchWrapper.style.display = 'block';
            } else {
                branchWrapper.style.display = 'none';
            }
        } catch (error) {
            console.error('Error while fetching branches:', error);
            branchWrapper.style.display = 'none';
        }
    });
});

function redirectToRepo() {
    const repoSelect   = document.getElementById('repo');
    const branchSelect = document.getElementById('branch');

    const selectedRepoOption = repoSelect.options[repoSelect.selectedIndex];
    const repoName  = selectedRepoOption.getAttribute('data-name');
    const repoId    = selectedRepoOption.getAttribute('data-id');
    const branch    = branchSelect.value;

    if (repoName && repoId) {
        let url = `/git/repos/${repoId}/${repoName}/`;
        if (branch) {  // we append the branch if user selected one
            url += `?branch=${encodeURIComponent(branch)}`;
        }
        window.location.href = url;
    } else {
        alert("Please select a repository.");
    }
}
</script>
{% endblock %}
