<title>Documentation</title>

{% extends 'layouts/blank.html' %}
{% load static %}

{% block content %}

<div style="padding-left: 2em">
    <br> <br> <br> <br>

    <h5 id="project-id" style="display: none;">{{ project.id }}</h5>


    <br><br>
    <h2>Components</h2>
    <br>

    <table id="sortableTable">
        <tr>
            <th>File</th>
            <th>Name</th>
            <th>Type</th>
            <th>Content</th>
        </tr>
        {% for c in project_components|dictsort:"file.path" %}
        <tr>
            <td>{{ c.file.path }}</td>
            <td>{{ c.name }}</td>
            <td>{{ c.component_type.name }}</td>

            <td>
                <button onclick="toggleContent('content-{{ c.id }}')" style="height: 2em; width: 6em; font-size: 1em; padding: 0.2em 0.5em; line-height: 1.2em;">Expand</button>
                <div id="content-{{ c.id }}" style="display:none;">
                    <pre style="color: #aaaaaa">{{ c.content }}</pre>
                </div>
            </td>
        </tr>
        {% endfor %}
    </table>
    <br>
</div>

    <!-- Ajoutez des sections similaires pour les autres modèles -->

    <script>
        function toggleContent(id) {
            var element = document.getElementById(id);
            if (element.style.display === "none") {
                element.style.display = "block";
            } else {
                element.style.display = "none";
            }
        }


        function redirectToRepo() {
            let projectId = document.getElementById("project-id").textContent;
            let projectName = document.getElementById("project-name").textContent;
            let projectRepo = document.getElementById("project-repo").textContent;

            if (projectId && projectRepo) {
                // Assurez-vous que l'URL ici correspond à la route dans votre urls.py
                var url = '/projects/documentation/update/' + projectId + '/' + projectRepo + '/' + projectName + '/';
                window.location.href = url;
            } else {
                alert("Please select a repository.");
            }
        }


        function redirectToDelete() {
            let projectId = document.getElementById("project-id").textContent;
            if (projectId) {
                if (confirm("Are you sure you want to delete this project?")) {
                    var url = '/projects/documentation/delete/' + projectId + '/';
                    window.location.href = url;
                }
            } else {
                alert("Project ID not found.");
            }
        }

        function redirectToSyncGithub() {
            let projectId = document.getElementById("project-id").textContent;
            if (projectId) {
                var url = '/projects/documentation/sync/' + projectId + '/';
                window.location.href = url;
            } else {
                alert("Project ID not found.");
            }
        }

        function redirectToDeleteGithubSync() {
            let projectId = document.getElementById("project-id").textContent;
            if (projectId) {
                var url = '/projects/documentation/delete_github_sync/' + projectId + '/';
                window.location.href = url;
            } else {
                alert("Project ID not found.");
            }
        }
    </script>

    <style>
        table {
            border-collapse: collapse;

        }
        th, td {
            padding: 10px; /* Ajoute un espace de 10px entre les colonnes */
            text-align: left;
            border-bottom: 1px solid #ddd;
            vertical-align: top; /* Empêche les colonnes de se recentrer */
        }
    </style>
{% endblock %}
